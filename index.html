<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Tema 1 - Graficación por Computadora</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/img/favicon1.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            Examen Tema 1 - API Canvas 2D
        </span>
        <span class="text-white">
            Programador: Jesus Roberto Hernandez
        </span>
    </div>
</nav>

<!-- ================= CONTENIDO ================= -->
<div class="container mt-4">

    <div class="row g-4">

    <!-- CANVAS -->
    <div class="col-md-6">
        <div class="card shadow-sm h-100">

            <div class="card-header d-flex justify-content-between align-items-center">
                <span><strong>Renderizado en Canvas</strong></span>
                <button class="btn btn-dark btn-sm" onclick="redibujar()">Redibujar</button>
            </div>

            <div class="card-body text-center">
                <canvas id="miCanvas" width="500" height="500"></canvas>
            </div>

        </div>
    </div>

    <!-- IMAGEN ORIGINAL -->
    <div class="col-md-6">
        <div class="card shadow-sm h-100">

            <div class="card-header">
                <strong>Imagen Original</strong>
            </div>

            <div class="card-body text-center">
                <img src="./assets/img/Barco_pirata.png" class="img-fluid rounded">
            </div>

        </div>
    </div>

</div>

</div>

<!-- ================= FOOTER ================= -->
<footer class="bg-dark text-white text-center mt-5 p-3">
    © 2026 - Examen Introducción a la Graficación por Computadora <br>
    Jesus Roberto Hernandez
</footer>
